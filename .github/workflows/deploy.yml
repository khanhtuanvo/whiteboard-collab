name: Deploy to AWS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # Only deploy after CI passes — no need to re-run tests here
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/whiteboard-collab

            # Save current image tags for rollback
            OLD_BACKEND=$(docker inspect --format='{{.Image}}' whiteboard-backend 2>/dev/null || echo "none")

            # Pull latest code
            git fetch --prune
            git reset --hard origin/main

            # Rebuild and restart
            docker compose up --build --detach --remove-orphans

            # Health check — wait up to 30s for backend to respond
            echo "Waiting for backend..."
            for i in $(seq 1 6); do
              if docker compose exec -T backend wget -qO- http://localhost:4000/health > /dev/null 2>&1; then
                echo "Backend healthy"
                break
              fi
              if [ $i -eq 6 ]; then
                echo "Health check failed — rolling back"
                # Roll back to previous image if available
                [ "$OLD_BACKEND" != "none" ] && docker compose down && docker compose up --detach
                exit 1
              fi
              sleep 5
            done

            # Clean up old images
            docker image prune -f